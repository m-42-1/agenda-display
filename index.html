<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Kalendár</title>
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #f0f0f0;
      padding-top: 40px;
      overflow-y: auto;
    }

    #sticky-header {
      position: sticky;
      top: 0;
      background: #000;
      z-index: 10;
      padding: 14px 20px 12px;
      border-bottom: 2px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2px;
    }

    #offline-badge {
      display: none;
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 0.75rem;
      color: #f59e0b;
      background: #422006;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    #header-date {
      font-size: 1.1rem;
      color: #b0b0b0;
      font-weight: 500;
    }

    #header-clock {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #fff;
    }

    #agenda {
      padding: 0 20px 40px;
    }

    .day-block {
      margin-top: 28px;
    }

    .day-header {
      font-size: 1.25rem;
      font-weight: 700;
      padding-bottom: 8px;
      border-bottom: 2px solid #333;
      margin-bottom: 10px;
      color: #fff;
    }

    .event {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: 24px; /* widened to give marker dots room to overflow time cell into the gap */
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 1.1rem;
      line-height: 1.4;
    }

    .event:last-child {
      border-bottom: none;
    }

    .event-past {
      opacity: 0.35;
    }

    .event-time {
      color: #b0b0b0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 1rem;
      padding-top: 2px;
    }

    .event-markers {
      display: inline-flex;
      gap: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .event-marker {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: none;
      flex-shrink: 0;
    }

    .event.event-new .event-marker-new {
      display: block;
      background: #facc15;
    }

    .event.event-current .event-marker-current {
      display: block;
      background: #ef4444;
      animation: pulse 1.4s ease-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0    rgba(239, 68, 68, 0.95); }
      70%  { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);    }
      100% { box-shadow: 0 0 0 0    rgba(239, 68, 68, 0);    }
    }

    .event-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .event-title {
      font-weight: 500;
      color: #f0f0f0;
      word-break: break-word;
      line-height: 1.35;
    }

    .event-description {
      font-size: 0.85rem;
      color: #b0b0b0;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      color: #888;
      font-size: 1rem;
      padding: 20px;
    }

    #error {
      display: none;
      padding: 24px 20px;
      color: #ff6b6b;
      font-size: 1rem;
      line-height: 1.5;
    }

    #error strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<header id="sticky-header">
  <div id="header-date"></div>
  <div id="header-clock"></div>
  <div id="offline-badge">⚠ Offline</div>
</header>

<div id="loading">Načítavam kalendár…</div>
<div id="error"></div>
<main id="agenda"></main>

<script>
  const ICS_URL = 'https://outlook.office365.com/owa/calendar/2e756fe3580945bd80f7c18d5eedf151@kultura.trnava.sk/fb299a1f15e14af1a6c09121b4f22ed610826515312205160777/calendar.ics';
  const CORS_PROXIES = [
    '',
    'https://corsproxy.io/?url=',
    'https://api.allorigins.win/raw?url=',
  ];
  const TZ = 'Europe/Bratislava';
  const MONTHS_AHEAD = 3;

  const NEW_DURATION_MS   = 7  * 86_400_000; // yellow dot shows for 7 days after firstSeen
  const PRUNE_DURATION_MS = 60 * 86_400_000; // prune UID records older than 60 days
  const TRACKER_KEY  = 'agenda-uid-tracker-v2';   // { uid: firstSeenMs }
  const BASELINE_KEY = 'agenda-baseline-done-v2'; // '1' once initial baseline fetch completed

  const DAYS_SK = ['Nedeľa', 'Pondelok', 'Utorok', 'Streda', 'Štvrtok', 'Piatok', 'Sobota'];
  const MONTHS_SK = [
    'januára', 'februára', 'marca', 'apríla', 'mája', 'júna',
    'júla', 'augusta', 'septembra', 'októbra', 'novembra', 'decembra'
  ];
  // ── Helpers ──────────────────────────────────────────────────────────────

  function localParts(jsDate) {
    const fmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: TZ,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
      weekday: 'narrow',
    });
    const p = {};
    for (const { type, value } of fmt.formatToParts(jsDate)) p[type] = value;
    // hour can be '24' when Intl wraps midnight
    if (p.hour === '24') p.hour = '00';
    return p;
  }

  function dateKey(jsDate) {
    const p = localParts(jsDate);
    return `${p.year}-${p.month}-${p.day}`;
  }

  function timeStr(jsDate) {
    const p = localParts(jsDate);
    return `${p.hour}:${p.minute}`;
  }

  // Returns a JS Date for midnight (00:00) Bratislava time on a given YYYY-MM-DD string
  function bratislavaMidnight(yyyy, mm, dd) {
    const tzFmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
    // Accept both strings (already padded) and numbers — pad to be safe
    const yStr = String(yyyy).padStart(4, '0');
    const mStr = String(mm).padStart(2, '0');
    const dStr = String(dd).padStart(2, '0');
    const utcStr = `${yStr}-${mStr}-${dStr}T00:00:00Z`;
    const ref = new Date(utcStr);
    const p = {};
    for (const { type, value } of tzFmt.formatToParts(ref)) p[type] = value;
    // Difference between what UTC midnight shows as in Bratislava vs midnight
    const tzH = parseInt(p.hour, 10);
    const tzM = parseInt(p.minute, 10);
    // offset = tzH*60 + tzM minutes ahead of UTC
    const offsetMin = tzH * 60 + tzM;
    return new Date(ref.getTime() - offsetMin * 60000);
  }

  function addMonths(date, months) {
    const d = new Date(date);
    d.setMonth(d.getMonth() + months);
    return d;
  }

  // ── Clock & header date ───────────────────────────────────────────────────

  function updateClock() {
    const now = new Date();
    const timeFmt = new Intl.DateTimeFormat('sk-SK', {
      timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
    });
    document.getElementById('header-clock').textContent = timeFmt.format(now).replace(/\./g, ':');

    const p = localParts(now);
    const jsDay = new Date(`${p.year}-${p.month}-${p.day}T12:00:00Z`);
    document.getElementById('header-date').textContent =
      `${DAYS_SK[jsDay.getUTCDay()]}, ${parseInt(p.day, 10)}. ${MONTHS_SK[parseInt(p.month, 10) - 1]} ${p.year}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  // ── ICS fetch ─────────────────────────────────────────────────────────────

  async function fetchICS() {
    for (const proxy of CORS_PROXIES) {
      try {
        const bustUrl = ICS_URL + '?_=' + Date.now();
        const url = proxy ? proxy + encodeURIComponent(bustUrl) : bustUrl;
        const resp = await fetch(url, { cache: 'no-store' });
        if (resp.ok) {
          const text = await resp.text();
          if (text.includes('BEGIN:VCALENDAR')) return text;
        }
      } catch (_) { /* try next */ }
    }
    throw new Error('Nepodarilo sa načítať kalendár ani cez proxy.');
  }

  // ── ICS parse & render ────────────────────────────────────────────────────

  // opts.skipTracking: when true, do not update UID tracker (used for cache renders
  // and offline fallback — only the authoritative fresh fetch should update state).
  function parseAndRender(icsText, opts = {}) {
    // Outlook uses both "Central Europe Standard Time" (Windows name, no VTIMEZONE)
    // and "Customized Time Zone" (has VTIMEZONE in this feed, same CET/CEST rules).
    // Normalize to the one that has a VTIMEZONE definition so ical.js can resolve it.
    icsText = icsText.replace(/TZID=Central Europe Standard Time/g, 'TZID=Customized Time Zone');

    const jcal = ICAL.parse(icsText);
    const comp = new ICAL.Component(jcal);

    // Register VTIMEZONE components so ical.js resolves them when converting to JS Date.
    // register() accepts an ICAL.Component directly and wraps it internally.
    for (const vtz of comp.getAllSubcomponents('vtimezone')) {
      ICAL.TimezoneService.register(vtz);
    }

    const now = new Date();
    const todayKey = dateKey(now);
    // Window: today 00:00 Bratislava → today + 3 months 23:59:59
    const p = localParts(now);
    const windowStart = bratislavaMidnight(p.year, p.month, p.day);
    const windowEnd = addMonths(windowStart, MONTHS_AHEAD);

    // Map: dateKey → array of event objects
    const byDay = {};

    const vevents = comp.getAllSubcomponents('vevent');

    // Update UID tracker only on authoritative fresh fetch (not cache/offline renders).
    if (!opts.skipTracking) updateSeenUids(vevents);

    for (const vevent of vevents) {
      const event = new ICAL.Event(vevent);

      if (event.isRecurring()) {
        const iter = event.iterator();
        let next;
        // Higher safety bound for daily recurrences with old DTSTART
        // (e.g. event repeating since 2020 needs ~2000 iterations to reach today)
        let safety = 0;
        while ((next = iter.next()) && safety++ < 10000) {
          const jsStart = next.toJSDate();
          if (jsStart > windowEnd) break;
          if (jsStart < windowStart) continue;
          addEvent(byDay, event, next, event.getOccurrenceDetails(next).endDate);
        }
      } else {
        const dtstart = event.startDate;
        const dtend = event.endDate;
        const jsStart = dtstart.toJSDate();
        const jsEnd = dtend ? dtend.toJSDate() : jsStart;
        if (jsStart >= windowEnd || jsEnd <= windowStart) continue;
        addEvent(byDay, event, dtstart, dtend);
      }
    }

    renderAgenda(byDay, windowStart, windowEnd);
  }

  function utcYmd(d) {
    return `${String(d.getUTCFullYear()).padStart(4,'0')}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }

  function pushEntry(byDay, key, entry) {
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(entry);
  }

  function addEvent(byDay, event, dtstart, dtend) {
    const description = (event.description || '').trim();
    const location = (event.location || '').trim();
    const title = event.summary || '(bez názvu)';
    const uid = event.uid || null;
    const isAllDay = dtstart.isDate;

    // For day-boundary computations: compute Bratislava-local midnight of a
    // given Y-M-D as a UTC ms value (so we can compare with Date.now()).
    const localMidnightMs = (yyyy, mm, dd) => bratislavaMidnight(yyyy, mm, dd).getTime();

    // ── Pure all-day events (VALUE=DATE) — expand each day in [dtstart, dtend)
    if (isAllDay) {
      const endDate = dtend
        ? new Date(Date.UTC(dtend.year, dtend.month - 1, dtend.day))
        : new Date(Date.UTC(dtstart.year, dtstart.month - 1, dtstart.day + 1));
      const cur = new Date(Date.UTC(dtstart.year, dtstart.month - 1, dtstart.day));
      let days = 0;
      while (cur < endDate && days++ < 400) {
        const dayKey = utcYmd(cur);
        const [y, m, d] = dayKey.split('-').map(Number);
        const dayStartMs = localMidnightMs(y, m, d);
        pushEntry(byDay, dayKey, {
          isAllDay: true,
          startMs: dayStartMs,
          endMs: dayStartMs + 86_400_000,
          timeLabel: 'Celý deň',
          title,
          description,
          location,
          uid,
        });
        cur.setUTCDate(cur.getUTCDate() + 1);
      }
      return;
    }

    // ── Timed events
    const jsStart = dtstart.toJSDate();
    const jsEnd = dtend ? dtend.toJSDate() : jsStart;
    const startKey = dateKey(jsStart);
    let endKey = dateKey(jsEnd);
    const startTime = timeStr(jsStart);
    const endTime = timeStr(jsEnd);

    // Single-day timed event
    if (startKey === endKey) {
      pushEntry(byDay, startKey, {
        isAllDay: false,
        startMs: jsStart.getTime(),
        endMs: jsEnd.getTime(),
        timeLabel: `${startTime} – ${endTime}`,
        title,
        description,
        location,
        uid,
      });
      return;
    }

    // Multi-day timed event: event ending exactly at midnight on a later day
    // really ends at end of previous day — drop the trailing midnight day.
    if (endTime === '00:00' && endKey > startKey) {
      const prev = new Date(jsEnd.getTime() - 86400000);
      endKey = dateKey(prev);
    }

    // Iterate from startKey to endKey using UTC date arithmetic (date-only safe)
    const [sy, sm, sd] = startKey.split('-').map(Number);
    const [ey, em, ed] = endKey.split('-').map(Number);
    const cur = new Date(Date.UTC(sy, sm - 1, sd));
    const last = new Date(Date.UTC(ey, em - 1, ed));
    let days = 0;
    while (cur.getTime() <= last.getTime() && days++ < 400) {
      const k = utcYmd(cur);
      const [y, mo, d] = k.split('-').map(Number);
      const dayStartMs = localMidnightMs(y, mo, d);
      let label, allDayFlag, startMs, endMs;
      if (k === startKey) {
        label = `od ${startTime}`;
        allDayFlag = false;
        startMs = jsStart.getTime();
        endMs = dayStartMs + 86_400_000; // continues until end of this day
      } else if (k === endKey) {
        label = `do ${endTime}`;
        allDayFlag = true; // sorts to top; this is a continuation ending today
        startMs = dayStartMs;
        endMs = jsEnd.getTime();
      } else {
        label = 'Celý deň';
        allDayFlag = true;
        startMs = dayStartMs;
        endMs = dayStartMs + 86_400_000;
      }
      pushEntry(byDay, k, {
        isAllDay: allDayFlag,
        startMs,
        endMs,
        timeLabel: label,
        title,
        description,
        location,
        uid,
      });
      cur.setUTCDate(cur.getUTCDate() + 1);
    }
  }

  function renderAgenda(byDay, windowStart, windowEnd) {
    const agenda = document.getElementById('agenda');
    agenda.innerHTML = '';

    // Collect and sort keys within window
    const keys = Object.keys(byDay).filter(k => {
      const d = new Date(k + 'T12:00:00Z');
      return d >= windowStart && d < windowEnd;
    }).sort();

    if (keys.length === 0) {
      agenda.innerHTML = '<p style="padding:24px 0;color:#888;">Žiadne udalosti v nasledujúcich 3 mesiacoch.</p>';
      return;
    }

    const todayKey = dateKey(new Date());

    for (const key of keys) {
      const events = byDay[key].sort((a, b) => {
        if (a.isAllDay && !b.isAllDay) return -1;
        if (!a.isAllDay && b.isAllDay) return 1;
        return a.startMs - b.startMs;
      });

      const [yyyy, mm, dd] = key.split('-');
      const refDate = new Date(`${key}T12:00:00Z`);
      const dow = DAYS_SK[refDate.getUTCDay()];
      const dayLabel = `${dow}, ${parseInt(dd, 10)}. ${MONTHS_SK[parseInt(mm, 10) - 1]} ${yyyy}`;

      const block = document.createElement('div');
      block.className = 'day-block';
      if (key === todayKey) block.dataset.today = '1';

      const header = document.createElement('div');
      header.className = 'day-header';
      header.textContent = dayLabel;
      block.appendChild(header);

      for (const ev of events) {
        const row = document.createElement('div');
        row.className = 'event';
        row.dataset.startMs = String(ev.startMs);
        row.dataset.endMs = String(ev.endMs);
        if (isUidNew(ev.uid)) row.classList.add('event-new');

        const timeEl = document.createElement('div');
        timeEl.className = 'event-time';
        const timeText = document.createElement('span');
        timeText.textContent = ev.timeLabel;
        timeEl.appendChild(timeText);

        // Marker dots inline after the time text (yellow=new, red pulsing=current).
        // Both spans are always in the DOM; CSS shows them based on row classes.
        // The markers visually overflow the 7rem time column into the gap to the
        // content column, which has been widened to fit them.
        const markersEl = document.createElement('span');
        markersEl.className = 'event-markers';
        const newMarker = document.createElement('span');
        newMarker.className = 'event-marker event-marker-new';
        markersEl.appendChild(newMarker);
        const currentMarker = document.createElement('span');
        currentMarker.className = 'event-marker event-marker-current';
        markersEl.appendChild(currentMarker);
        timeEl.appendChild(markersEl);

        const contentEl = document.createElement('div');
        contentEl.className = 'event-content';

        const titleEl = document.createElement('div');
        titleEl.className = 'event-title';
        titleEl.textContent = ev.title;
        contentEl.appendChild(titleEl);

        if (ev.location) {
          const locEl = document.createElement('div');
          locEl.className = 'event-description';
          locEl.textContent = ev.location;
          contentEl.appendChild(locEl);
        }

        if (ev.description) {
          const descEl = document.createElement('div');
          descEl.className = 'event-description';
          descEl.textContent = ev.description;
          contentEl.appendChild(descEl);
        }

        row.appendChild(timeEl);
        row.appendChild(contentEl);
        block.appendChild(row);
      }

      agenda.appendChild(block);
    }

    applyTodayStateClasses();
  }

  function applyTodayStateClasses() {
    const now = Date.now();
    const todayBlock = document.querySelector('.day-block[data-today="1"]');
    if (!todayBlock) return;
    for (const row of todayBlock.querySelectorAll('.event')) {
      const startMs = Number(row.dataset.startMs);
      const endMs = Number(row.dataset.endMs);
      row.classList.remove('event-past', 'event-current');
      if (endMs <= now) {
        row.classList.add('event-past');
      } else if (startMs <= now && now < endMs) {
        row.classList.add('event-current');
      }
    }
  }

  // ── Main load ─────────────────────────────────────────────────────────────

  const CACHE_KEY = 'agenda-cache-ics';
  let lastSuccessfulICS = null;
  let isOffline = false;

  function updateOfflineBadge() {
    document.getElementById('offline-badge').style.display = isOffline ? 'block' : 'none';
  }

  // ── New-event yellow dot (UID tracking) ───────────────────────────────────
  // Approach: localStorage tracks UIDs (firstSeenMs). At baseline (very first
  // fetch ever), use ICS CREATED as a tie-breaker — events with CREATED in the
  // last 7 days get firstSeen=now (dot shown), older events get firstSeen=0
  // (no dot). After baseline, any UID never seen before gets firstSeen=now.
  // Cache-render skips tracking entirely → only the authoritative fresh fetch
  // updates state, eliminating the inconsistency that broke previous attempts.

  let seenUids = {};        // { uid: firstSeenMs }  (firstSeenMs=0 → baseline old, never show dot)
  let baselineDone = false; // true after the initial baseline fetch has completed

  function initTracking() {
    try {
      const raw = localStorage.getItem(TRACKER_KEY);
      if (raw) seenUids = JSON.parse(raw);
      baselineDone = localStorage.getItem(BASELINE_KEY) === '1';
      // One-time cleanup of stale keys from earlier attempts
      localStorage.removeItem('agenda-seen-uids');
      localStorage.removeItem('agenda-install-ts');
    } catch (_) {}
  }

  // Best-effort extraction of the CREATED timestamp from a VEVENT component.
  function getCreatedMs(vevent) {
    try {
      const v = vevent.getFirstPropertyValue('created');
      if (v && typeof v.toJSDate === 'function') return v.toJSDate().getTime();
    } catch (_) {}
    return null;
  }

  // Called by parseAndRender on the authoritative fresh fetch only.
  // vevents: array of ICAL.Component (VEVENTs from the feed).
  function updateSeenUids(vevents) {
    const now = Date.now();
    const seenInThisFetch = new Set();

    for (const vevent of vevents) {
      const uid = vevent.getFirstPropertyValue('uid');
      if (!uid || seenInThisFetch.has(uid)) continue;
      seenInThisFetch.add(uid);
      if (uid in seenUids) continue; // already tracked

      if (!baselineDone) {
        // BASELINE: only mark recently-CREATED events as new (firstSeen=now);
        // everything else as baseline-old (firstSeen=0).
        const createdMs = getCreatedMs(vevent);
        const isRecent = createdMs && (now - createdMs < NEW_DURATION_MS);
        seenUids[uid] = isRecent ? now : 0;
      } else {
        // Post-baseline: any never-before-seen UID is genuinely new.
        seenUids[uid] = now;
      }
    }

    if (!baselineDone) {
      baselineDone = true;
      try { localStorage.setItem(BASELINE_KEY, '1'); } catch (_) {}
    }

    // Prune records older than 60 days (skip baseline-old tombstones at 0)
    for (const uid in seenUids) {
      if (seenUids[uid] > 0 && now - seenUids[uid] > PRUNE_DURATION_MS) {
        delete seenUids[uid];
      }
    }
    try { localStorage.setItem(TRACKER_KEY, JSON.stringify(seenUids)); } catch (_) {}
  }

  function isUidNew(uid) {
    if (!uid) return false;
    const firstSeen = seenUids[uid];
    if (!firstSeen) return false; // baseline-old (=0) or unknown
    return Date.now() - firstSeen < NEW_DURATION_MS;
  }

  async function loadAgenda(silent = false) {
    if (!silent && !lastSuccessfulICS) {
      document.getElementById('loading').style.display = 'flex';
    }
    try {
      const icsText = await fetchICS();
      lastSuccessfulICS = icsText;
      isOffline = false;
      try { localStorage.setItem(CACHE_KEY, icsText); } catch (_) {}
      parseAndRender(icsText);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      updateOfflineBadge();
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      if (lastSuccessfulICS) {
        // Wi-Fi blip — keep showing cached data with a discrete offline badge.
        // Skip UID tracking: only the fresh fetch is authoritative for "new" detection.
        isOffline = true;
        try { parseAndRender(lastSuccessfulICS, { skipTracking: true }); } catch (_) {}
        updateOfflineBadge();
      } else {
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        errEl.innerHTML = `<strong>Chyba pri načítaní kalendára</strong>
          Skontrolujte internetové pripojenie a obnovte stránku.<br>
          <span style="color:#b0b0b0;font-size:0.9rem">${err.message}</span>`;
      }
    }
  }

  // ── Init: hydrate from localStorage cache (instant render on reload) ──────
  initTracking();
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached && cached.includes('BEGIN:VCALENDAR')) {
      lastSuccessfulICS = cached;
      // Skip UID tracking on cache render: only the upcoming fresh fetch is authoritative.
      parseAndRender(cached, { skipTracking: true });
      document.getElementById('loading').style.display = 'none';
    }
  } catch (_) {}

  loadAgenda();
  setInterval(() => loadAgenda(true), 60 * 1000);

  // Re-apply event-current/event-past classes every minute (between fetches)
  setInterval(applyTodayStateClasses, 60 * 1000);

  // ── Wake Lock API — defense in depth to keep screen on ────────────────────
  let wakeLock = null;
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (_) { /* ignore — Fully Kiosk is the primary mechanism */ }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
  });
  requestWakeLock();
</script>
</body>
</html>
